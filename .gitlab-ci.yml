# 1. Говорим, что у нас будет
stages:
  - build
  - deploy

# Отключаем TLS для Docker-in-Docker
variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# 2. Первая задача(джоб). Назовем её 'build_image'
build_image:

  stage: build         # К какому этапу относится
  image: docker:24.0.5       # Выдаем роботу инструменты
  services:
    - docker:24.0.5-dind
  tags:
    - docker
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest


# НОВЫЙ БЛОК: ДЕПЛОЙ
deploy_to_k8s:
  stage: deploy
  image: alpine:latest  # Берем супер-легкий образ линукса
  tags:
    - docker
  before_script:
    # Устанавливаем SSH-клиент и загружаем твой приватный ключ
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    # 1. Копируем папку k8s/ со всеми манифестами на сервер с кластером
    - scp -o StrictHostKeyChecking=no -r k8s/ ubuntu@62.84.116.94:/home/ubuntu/
    
    # 2. Подключаемся по SSH и применяем манифесты в k3s
    - ssh -o StrictHostKeyChecking=no ubuntu@62.84.116.94 "sudo k3s kubectl apply -f /home/ubuntu/k8s/"
    
    # 3. Перезапускаем поды, чтобы они скачали свежий образ (latest)
    - ssh -o StrictHostKeyChecking=no ubuntu@62.84.116.94 "sudo k3s kubectl rollout restart deployment my-web-app"